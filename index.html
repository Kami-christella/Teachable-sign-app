<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teachable Machine Image Model</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f6f8fb, #beb9c8);
    }

    .app-card {
      max-width: 720px;
      border-radius: 24px;
    }

    #webcam-container canvas {
      width: 100%;
      max-width: 320px;
      border-radius: 18px;
      border: 4px solid #f8f9fa;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }

    .prediction-item {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 10px;
      font-weight: 600;
    }
  </style>
</head>

<body class="d-flex align-items-center justify-content-center p-3">

  <div class="card app-card shadow-lg border-0 w-100">
    <div class="card-body p-4 p-md-5 text-center">

      <!-- <span class="badge text-bg-primary mb-3 px-3 py-2">
        AI Image Recognition
      </span> -->

      <h1 class="fw-bold mb-3">
       Sign Recognition
      </h1>

      <!-- <p class="text-muted mb-4">
        Start the webcam and let the AI model classify images in real time.
      </p> -->

      <button
        type="button"
        class="btn btn-primary btn-lg px-5 rounded-pill shadow-sm mb-4"
        onclick="init()"
        id="start-btn"
      >
        Start Camera
      </button>

      <div class="row g-4 align-items-start">
        <div class="col-md-6">
          <div class="p-3 bg-dark rounded-4">
            <h5 class="text-white mb-3">Webcam Preview</h5>
            <div id="webcam-container" class="d-flex justify-content-center"></div>
          </div>
        </div>

        <div class="col-md-6 text-start">
          <div class="p-3 bg-white border rounded-4 h-100">
            <h5 class="fw-bold mb-3">Predictions</h5>
            <div id="label-container">
              <p class="text-muted mb-0">
                Predictions will appear here after starting the camera.
              </p>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

  <script>
    const URL = "https://teachablemachine.withgoogle.com/models/bafbghjUj/";

    let model, webcam, labelContainer, maxPredictions;

    async function init() {
      const startBtn = document.getElementById("start-btn");
      startBtn.disabled = true;
      startBtn.innerText = "Loading...";

      const modelURL = URL + "model.json";
      const metadataURL = URL + "metadata.json";

      model = await tmImage.load(modelURL, metadataURL);
      maxPredictions = model.getTotalClasses();

      const flip = true;
      webcam = new tmImage.Webcam(300, 300, flip);

      await webcam.setup();
      await webcam.play();

      window.requestAnimationFrame(loop);

      const webcamContainer = document.getElementById("webcam-container");
      webcamContainer.innerHTML = "";
      webcamContainer.appendChild(webcam.canvas);

      labelContainer = document.getElementById("label-container");
      labelContainer.innerHTML = "";

      for (let i = 0; i < maxPredictions; i++) {
        const predictionDiv = document.createElement("div");
        predictionDiv.className = "prediction-item";
        labelContainer.appendChild(predictionDiv);
      }

      startBtn.innerText = "Camera Started";
    }

    async function loop() {
      webcam.update();
      await predict();
      window.requestAnimationFrame(loop);
    }

    async function predict() {
      const prediction = await model.predict(webcam.canvas);

      for (let i = 0; i < maxPredictions; i++) {
        const percentage = (prediction[i].probability * 100).toFixed(1);

        labelContainer.childNodes[i].innerHTML = `
          <div class="d-flex justify-content-between mb-1">
            <span>${prediction[i].className}</span>
            <span>${percentage}%</span>
          </div>

          <div class="progress" style="height: 8px;">
            <div 
              class="progress-bar" 
              role="progressbar" 
              style="width: ${percentage}%;">
            </div>
          </div>
        `;
      }
    }
  </script>

</body>
</html>
